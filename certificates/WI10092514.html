     <title>Certificate & Work Log</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Load Remixicon for the toggle icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Custom styles for glass effect and Inter font */
        :root {
            font-family: 'Inter', sans-serif;
        }
        .glass {
            /* Kept the glass effect, but applied it to a white background */
            background-color: rgba(255, 255, 255, 0.7); /* Slightly whiter background */
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1); /* Darker border for contrast on white */
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px 0 rgba(31, 38, 135, 0.1); /* Softer shadow */
        }
        /* Ensure the iframe fills its designated container height */
        .iframe-container {
            /* This is the container that will be 50vh tall on medium screens and up */
            height: 300px; /* Default height for mobile/small screens */
        }
        @media (min-width: 768px) {
            .iframe-container {
                height: 50vh; /* Half of the viewport height for desktop/tablet */
            }
        }
        .questions__content {
            transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out;
            overflow: hidden;
            max-height: 0;
            padding: 0 1rem;
        }
        .questions__content.active {
            max-height: 1000px; /* Arbitrarily large value to allow content to show */
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .questions__header {
            cursor: pointer;
            user-select: none;
        }
        .questions__icon {
            transition: transform 0.3s;
        }
        .questions__header.active .questions__icon {
            transform: rotate(45deg);
        }
    </style>

    <main>
      <!--==================== HOME ====================-->
      <section class="home" id="home">
        <!-- Main container for the 2-column layout -->
        <!-- flex-col on small, flex-row on medium screens and up. Items stretch to fill height. -->
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8">

            <!-- LEFT SIDE: Certificate Image (50% width on desktop) -->
            <div class="w-full md:w-1/2 flex justify-center items-start p-4 rounded-xl" style="margin-top:8vh;">

                <img src="assets/img/WI10092514.webp" alt="Certificate of Completion" class="w-full h-auto rounded-lg shadow-xl"/>
            </div>

            <!-- RIGHT SIDE: Work Log Dropdown (50% width on desktop) -->
            <div class="w-full md:w-1/2">
                <div class="glass questions__item rounded">
                    <header class="questions__header flex items-center justify-between text-white rounded-t-xl transition duration-300" id="worklog-header">
                        <h3 class = "questions__item-title text-lg font-semibold">
                            Intern Weekly Work Log
                        </h3>
                        <i class="ri-add-line questions__icon text-2xl font-bold"></i>
                    </header>
                    
                    <!-- Content area: Includes the specific height requirement -->
                    <div class="questions__content active" id="worklog-content" style="max-height: 1000px;">
                        <!-- Iframe container now controls the height (50vh on desktop) -->
                        <div class="iframe-container w-full rounded-b-xl overflow-hidden border border-gray-200">
                            <!-- Iframe set to fill 100% of its parent container's height and width -->
                            <iframe 
                                src="https://drive.google.com/file/d/1wtalfiAV9qxnWe1qaWfi9irJE93QCaeN/preview" 
                                style="width:100%; height: 100%; border: 0;" 
                                title="Intern Work Log Document"
                            ></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
