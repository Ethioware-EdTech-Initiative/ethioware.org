# CI + deploy.
#
# On every push/PR to master the test jobs run. They are the REQUIRED status
# checks (see DEPLOY.md → Branch protection): a PR cannot merge until they pass.
# The `deploy` job runs ONLY on push to master and ONLY after every test job
# passes (needs:), rsyncing the site to cPanel over SSH. Because master is
# protected, a push to master only happens by merging a green PR — so nothing
# broken is ever deployed.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {} # allow a manual re-deploy from the Actions tab

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  html-primary:
    name: HTML (primary pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:html

  links-offline:
    name: Links & assets (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build lychee targets (primary pages + shared assets)
        id: lychee_targets
        run: |
          list=$(awk '!/^#/ && NF' ci/primary-html.txt | paste -sd' ' -)
          root_css=$(find . -maxdepth 1 -name '*.css' | paste -sd' ' -)
          {
            echo 'args<<LYCHEE_EOF'
            printf '%s\n' "--offline --root-dir . --exclude-path node_modules --no-progress ${list} ${root_css} assets"
            echo 'LYCHEE_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Check local href/src and url() resolve on disk
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: ${{ steps.lychee_targets.outputs.args }}

  js-syntax:
    name: JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: node --check on checked-in scripts
        run: |
          set -e
          for f in biniyam.js cognify/auth.js; do
            if [ -f "$f" ]; then
              node --check "$f"
            fi
          done

  cert-routes:
    name: Certificate short URLs resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Emulate .htaccess and verify every certificate URL resolves
        run: python3 ci/htaccess-route-check.py

  assets:
    name: Asset references resolve (all pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no new broken image/link references across all 244 pages
        run: python3 ci/check-assets.py

  php-syntax:
    name: PHP syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: php -l on checked-in PHP
        run: |
          set -e
          for f in $(find . -name '*.php' -not -path './node_modules/*'); do
            php -l "$f"
          done

  guard:
    name: Repo hygiene & secret guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No DB-credential config.php may be committed
        run: |
          if git ls-files | grep -E '(^|/)config\.php$'; then
            echo "::error::config.php (DB credentials) must never be committed — it is gitignored. Remove it from the index."
            exit 1
          fi
      - name: node_modules must not be committed
        run: |
          if git ls-files | grep -q '^node_modules/'; then
            echo "::error::node_modules/ must not be committed."
            exit 1
          fi
      - name: No private keys committed
        # Exclude this workflow (it contains the search patterns) and docs.
        run: |
          if git grep -lI -e 'BEGIN OPENSSH PRIVATE KEY' \
                          -e 'BEGIN RSA PRIVATE KEY' \
                          -e 'BEGIN EC PRIVATE KEY' \
                          -e 'BEGIN PRIVATE KEY' \
                          -- . ':!.github/' ':!*.md' ; then
            echo "::error::A private key appears to be committed — remove it and rotate it."
            exit 1
          fi
      - name: Required deploy files are present
        run: |
          test -f .deployignore || { echo "::error::.deployignore missing"; exit 1; }

  deploy:
    name: Deploy to cPanel (rsync over SSH)
    runs-on: ubuntu-latest
    # Gate: every test job must pass first. If any fails, deploy is skipped.
    needs:
      [html-primary, links-offline, js-syntax, cert-routes, assets, php-syntax, guard]
    # Only deploy real pushes to master (not PRs); allow manual dispatch too.
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
      - name: Deploy with rsync
        # No --delete: server-only files (config.php, manually-managed backends,
        # uploads) are preserved. Excludes come from .deployignore.
        run: |
          rsync -rltzv --checksum --chmod=D755,F644 \
            --exclude-from=.deployignore \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.CPANEL_SSH_PORT }} -o StrictHostKeyChecking=accept-new" \
            ./ "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_DEPLOY_PATH }}/"
