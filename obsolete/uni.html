<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== FAVICON ===============-->
    <link rel="shortcut icon" href="assets/img/logo.png" type="image/x-icon" />

    <!--=============== REMIX ICONS ===============-->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css" />

    <title>List of Ethiopian Universities</title>
  </head>
  <body>
    <!--==================== HEADER ====================-->
    <header class="header" id="header">
      <nav class="nav container">
        <a href="./index.html" class="nav__logo">
          <img src="assets/img/logo-mini.png"> Ethioware
        </a>
        <div class="nav__btns">
          <!-- Theme change button -->
          <i class="ri-moon-line change-theme" id="theme-button"></i>

          <div class="nav__toggle" id="nav-toggle">
            <i class="ri-menu-line"></i>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <!--==================== HOME ====================-->
      <section class="questions section" id="articles">
        <div class=" container grid">
            <!-- PDF Viewer Dropdown Menu -->
            <div style="border-bottom-right-radius: 10px; border-bottom-left-radius: 10px;">
                <div class="questions__item" style="border-bottom-right-radius: 10px; border-bottom-left-radius: 10px;">
                    <header class="questions__header glass" style="border-top-right-radius: 10px; border-top-left-radius: 10px;">
                        <i class="ri-add-line questions__icon"></i>
                        <h3 class="questions__item-title">
                            Complete List of Ethiopian Universities
                        </h3>
                    </header>
                    <div class="questions__content" style="border-bottom-right-radius: 10px;border-bottom-left-radius: 10px;">
                        <div style="border-bottom-right-radius: 10px;border-bottom-left-radius: 10px; left: 0; width: 100%; height: 0; position: relative; padding-bottom: 129.4118%;" class="questions__content"><iframe src="assets/Complete List of Ethiopian Universities.pdf" style="top: 0; left: 0; width: 100%; height: 100%; position: absolute; border: 0;" allowfullscreen></iframe></div>
                    </div>
                </div>
            </div>
            <!-- Download Button -->
            <a href="assets/Complete List of Ethiopian Universities.pdf" download onclick="incrementCounter()">
                <button class="download-button glass" style="padding: 10px 20px; font-size: 16px; background-color: #007bff; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">
                    Download
                </button>
              </a>
              <span style= "width: auto;" id="download-counter"> </span>
            </div>
            </a>
        </div>
    </section>
    
        
     <!-- Footer -->
        
        <p class="footer__copy">
          &#169; 2024 Ethioware EdTech Initiative. All Rights Reserved
        </p>
      </section>
    </main>

    <!--=============== SCROLL UP ===============-->
    <a href="#" class="scrollup" id="scroll-up">
      <i class="ri-arrow-up-fill scrollup__icon"></i>
    </a>

    <!--=============== SCROLL REVEAL ===============-->
    <script src="assets/js/scrollreveal.min.js"></script>
    <script src="assets/js/script.js"></script>

    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
    <script>
      // Initialize download count
      let downloadCount = 28;

      // Function to increment the download counter
      function incrementCounter() {
        downloadCount++;
        document.getElementById("download-counter").textContent = ` ${downloadCount}`;
      }
    </script>
  </body>
</html>
